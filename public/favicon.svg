<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E7D3A" />
      <stop offset="50%" stop-color="#6B5E2C" />
      <stop offset="100%" stop-color="#4D4420" />
    </linearGradient>
  </defs>
  
  <!-- Schild/Wappen als Favicon -->
  <path 
    d="M50,10 L80,25 A60,60 0 0 1 50,90 A60,60 0 0 1 20,25 Z" 
    stroke="url(#gold-gradient)" 
    stroke-width="2" 
    fill="#F5F5F5"
  />
  
  <!-- Subtiles FT in der Mitte -->
  <text 
    x="50" 
    y="55" 
    font-family="serif" 
    font-size="24" 
    text-anchor="middle"
    fill="url(#gold-gradient)"
  >
    FT
